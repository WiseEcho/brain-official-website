server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 兼容旧 Nuxt 官网的无后缀路由，避免历史入口或搜索收录链接失效。
    location = /product {
        return 301 /products.html;
    }

    location = /price {
        return 301 /pricing.html;
    }

    location = /about {
        return 301 /about.html;
    }

    # 兼容旧站曾经使用的 /home 前缀。
    location = /home {
        return 301 /;
    }

    location = /home/ {
        return 301 /;
    }

    location = /home/product {
        return 301 /products.html;
    }

    location = /home/price {
        return 301 /pricing.html;
    }

    location = /home/about {
        return 301 /about.html;
    }

    # HTML 页面不做长缓存，方便官网内容替换后及时生效。
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # 图片、视频、样式和脚本体积较大，使用短期公共缓存降低重复加载压力。
    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|mp4|webmanifest|woff|woff2|ttf|otf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
